services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend1:
    build: ./E-commerce-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  backend2:
    build: ./E-commerce-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  backend3:
    build: ./E-commerce-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./E-commerce-front
    depends_on:
      - backend1
    restart: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend1
      - backend2
      - backend3
      - frontend
    restart: always

volumes:
  pgdata: