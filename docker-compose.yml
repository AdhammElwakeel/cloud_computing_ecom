services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./E-commerce-backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./E-commerce-front
    ports:
      - "3000:80"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: on-failure

volumes:
  pgdata: